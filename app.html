<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevHub - Gestão de Projetos</title>
  <meta name="description" content="Plataforma para desenvolvedores criarem, organizarem e acompanharem seus projetos e tarefas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH VIEW
══════════════════════════════════════════ -->
<div id="auth-view">
  <div id="canvas-bg"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">DevHub</div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="Auth.showTab('login')">Entrar</button>
        <button class="auth-tab" id="tab-register" onclick="Auth.showTab('register')">Criar Conta</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form" onsubmit="Auth.login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <div style="position:relative">
            <input type="password" id="login-password" placeholder="••••••••" required style="padding-right:40px">
            <span onclick="document.getElementById('login-password').type = document.getElementById('login-password').type === 'password' ? 'text' : 'password'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn-auth">Entrar →</button>
      </form>

      <!-- Register -->
      <form id="register-form" class="auth-form hidden" onsubmit="Auth.register(event)">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="reg-nome" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <div style="position:relative">
            <input type="password" id="reg-password" placeholder="6-12 caracteres, maiúscula, número, especial" required minlength="6" maxlength="12" style="padding-right:40px">
            <span onclick="document.getElementById('reg-password').type = document.getElementById('reg-password').type === 'password' ? 'text' : 'password'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px">👁️</span>
          </div>
          <small style="color:var(--muted);font-size:11px">Mínimo 6, máximo 12 caracteres. Precisa: 1 maiúscula, 1 número, 1 especial (!@#$%...)</small>
        </div>
        <button type="submit" class="btn-auth">Criar Conta 🚀</button>
      </form>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APP SHELL
══════════════════════════════════════════ -->
<div id="app-shell" class="hidden">

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">⚡ DevHub</div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item" data-route="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#ideias" class="nav-item" data-route="ideias">
        <span class="nav-icon">💡</span>
        <span class="nav-label">Ideias</span>
      </a>
      <a href="#projetos" class="nav-item" data-route="projetos">
        <span class="nav-icon">📁</span>
        <span class="nav-label">Projetos</span>
      </a>
      <a href="#tarefas" class="nav-item" data-route="tarefas">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Tarefas</span>
      </a>
      <a href="#servicos" class="nav-item" data-route="servicos">
        <span class="nav-icon">🛠️</span>
        <span class="nav-label">Serviços</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="#perfil" class="nav-item" data-route="perfil">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Perfil</span>
      </a>
      <button class="logout-btn" onclick="Auth.logout()">
        <span>🚪</span>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-search">
        <span>🔍</span>
        <input type="text" id="global-search" placeholder="Buscar ideias, projetos, tarefas..." oninput="handleSearch(this.value)">
      </div>
      <div class="topbar-right">
        <div class="user-chip" onclick="Router.navigate('perfil')">
          <span id="topbar-avatar">🧑‍💻</span>
          <span id="topbar-name">Dev</span>
        </div>
      </div>
    </header>

    <main id="main-content">
      <div class="spinner"></div>
    </main>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MODAL
══════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="Modal.close()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     TOAST
══════════════════════════════════════════ -->
<div id="toast-container"></div>

<script src="three.min.js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
